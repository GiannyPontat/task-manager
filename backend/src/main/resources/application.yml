spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/taskmanager}
    username: ${DB_USERNAME:taskmanager}
    password: ${DB_PASSWORD:taskmanager}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

server:
  port: 8080

logging:
  level:
    com.taskmanager.security: DEBUG

application:
  frontend-url: ${FRONTEND_URL:http://localhost:4200}
  security:
    jwt:
      secret-key: "5a6f4b3c8d2e1f9a7b0c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d3e4f5a"
      expiration: 3600000 # 1 heure en ms
