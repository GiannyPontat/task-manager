# ── Base de données (Supabase) ─────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool HikariCP — Supabase free tier : 20 connexions max
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
# Ne pas faire planter le boot si Supabase met du temps à répondre
spring.datasource.hikari.initialization-fail-timeout=-1

# ── JPA ───────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Flyway désactivé (ddl-auto=update gère le schéma) ────────────────────
spring.flyway.enabled=false

# ── Serveur ───────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ── JWT ───────────────────────────────────────────────────────────────────
application.security.jwt.secret-key=${JWT_SECRET}
application.security.jwt.expiration=3600000

# ── CORS ─────────────────────────────────────────────────────────────────
application.allowed-origins=${ALLOWED_ORIGINS:http://localhost:4200}
application.frontend-url=${FRONTEND_URL:http://localhost:4200}

# ── Mail (Resend API) ─────────────────────────────────────────────────────
resend.api-key=${RESEND_API_KEY}
resend.from=${RESEND_FROM:Flowly <onboarding@resend.dev>}

# ── Logs ──────────────────────────────────────────────────────────────────
logging.level.com.taskmanager=INFO
logging.level.com.taskmanager.security=WARN
