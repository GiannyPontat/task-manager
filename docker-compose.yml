services:

  postgres:
    image: postgres:16-alpine
    container_name: tm-postgres
    environment:
      POSTGRES_DB: taskmanager
      POSTGRES_USER: ${DB_USERNAME:-taskmanager}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-taskmanager}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskmanager"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: tm-backend
    environment:
      DB_USERNAME: ${DB_USERNAME:-taskmanager}
      DB_PASSWORD: ${DB_PASSWORD:-taskmanager}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/taskmanager
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: tm-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  postgres_data:
